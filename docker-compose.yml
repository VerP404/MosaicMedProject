services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mosaicmed}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup:ro
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mosaicmed}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mosaicmed:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      HOST: db
      Name: ${POSTGRES_DB:-mosaicmed}
      USER: ${POSTGRES_USER:-postgres}
      PASSWORD: ${POSTGRES_PASSWORD}
      PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-mosaicmed}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      DAGSTER_HOME: /app/mosaic_conductor/dagster_home
      DAGSTER_PORT: "3000"
      MASTERD_PORT: "5020"
      PORT_DASH: "5000"
      PORT_DASH_CHIEF: "5001"
      PORT_DASH_DN: "7777"
      DJANGO_API_BASE: http://127.0.0.1:8000
      DEBUG_DJ: "False"
      DEBUG_DASH: "False"
      DAGSTER_USE_XVFB: "0"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DJANGO_PORT:-8000}:8000"
      - "${PORT_DASH:-5000}:5000"
      - "${PORT_DASH_CHIEF:-5001}:5001"
      - "${MASTERD_PORT:-5020}:5020"
      - "${DAGSTER_PORT:-3000}:3000"
      - "${PORT_DASH_DN:-7777}:7777"
    volumes:
      - mosaic_etl_data:/app/mosaic_conductor/etl/data
      - mosaic_dagster_home:/app/mosaic_conductor/dagster_home
      - mosaic_uploads:/app/uploads
      - mosaic_logs:/app/logs
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  postgres_data:
  mosaic_etl_data:
  mosaic_dagster_home:
  mosaic_uploads:
  mosaic_logs:
